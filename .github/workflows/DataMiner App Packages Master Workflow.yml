name: DataMiner App Packages

# Needed for OIDC, checkout, git-push, ...
permissions: write-all

on:
  workflow_call:
    inputs:
      # No need to specify these as the workflow can access github.* (https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/accessing-contextual-information-about-workflow-runs#github-context)
      # When a reusable workflow is triggered by a caller workflow, the github context is always associated with the caller workflow.
      referenceName:
        required: false
        type: string
      runNumber:
        required: false
        type: string
      referenceType:
        required: false
        type: string
      repository:
        required: false
        type: string
      owner:
        required: false
        type: string

      # One or more lines with <relative path to manifest.yml>=<catalog identifier>.
      # Example:
      #   PackageA.Install/CatalogInformation/manifest.yml=11111111-1111-1111-1111-111111111111
      #   PackageB.Install/CatalogInformation/manifest.yml=22222222-2222-2222-2222-222222222222
      overrideCatalogIdentifiers:
        required: false
        type: string

      # Optional OIDC inputs in case outside SkylineCommunications organization
      oidc-client-id:
        required: false
        type: string
      oidc-tenant-id:
        required: false
        type: string
      oidc-subscription-id:
        required: false
        type: string

      sonarCloudProjectName:
        required: true
        type: string
      configuration:
        required: true
        type: string
      solutionFilterName:
        required: false
        type: string
      debug:
        required: false
        type: boolean

    secrets:
      sonarCloudToken:
        required: false
      dataminerToken:
        required: false
      azureToken:
        required: false
      overrideCatalogDownloadToken:
        required: false

jobs:
  check_deprecated_item:
    name: Check deprecated items
    runs-on: ubuntu-latest
    steps:
      - name: Check if obsolete inputs are still used
        env:
          INPUT_REFERENCENAME: ${{ inputs.referenceName }}
          INPUT_RUNNUMBER: ${{ inputs.runNumber }}
          INPUT_REFERENCETYPE: ${{ inputs.referenceType }}
          INPUT_REPOSITORY: ${{ inputs.repository }}
          INPUT_OWNER: ${{ inputs.owner }}
        run: |
          declare -A input_values=(
            [referenceName]="$INPUT_REFERENCENAME"
            [runNumber]="$INPUT_RUNNUMBER"
            [referenceType]="$INPUT_REFERENCETYPE"
            [repository]="$INPUT_REPOSITORY"
            [owner]="$INPUT_OWNER"
          )

          for input_name in "${!input_values[@]}"; do
            if [ -n "${input_values[$input_name]}" ]; then
              echo "::warning::The input '$input_name' can be safely removed as this is not required anymore."
            fi
          done

      - name: Check if obsolete secrets are still used
        if: github.repository_owner == 'SkylineCommunications'
        env:
          SECRET_AZURETOKEN: ${{ secrets.azureToken }}
          SECRET_SONARCLOUDTOKEN: ${{ secrets.sonarCloudToken }}
        run: |
          declare -A secret_values=(
            [azureToken]="$SECRET_AZURETOKEN"
            [sonarCloudToken]="$SECRET_SONARCLOUDTOKEN"
          )

          for secret_name in "${!secret_values[@]}"; do
            if [ -n "${secret_values[$secret_name]}" ]; then
              echo "::warning::The secret '$secret_name' can be safely removed as this is not required anymore."
            fi
          done

  master_workflow:
    uses: ./.github/workflows/Master Workflow.yml
    with:
      oidc-client-id: ${{ inputs.oidc-client-id }}
      oidc-tenant-id: ${{ inputs.oidc-tenant-id }}
      oidc-subscription-id: ${{ inputs.oidc-subscription-id }}
      sonarcloud-project-name: ${{ inputs.sonarCloudProjectName }}
      configuration: ${{ inputs.configuration }}
      solution-filter-name: ${{ inputs.solutionFilterName }}
      override-catalog-identifiers: ${{ inputs.overrideCatalogIdentifiers }}
      debug: ${{ inputs.debug }}
    secrets:
      SONAR_TOKEN: ${{ secrets.sonarCloudToken }}
      AZURE_TOKEN: ${{ secrets.azureToken }}
      DATAMINER_TOKEN: ${{ secrets.dataminerToken }}
      OVERRIDE_CATALOG_DOWNLOAD_TOKEN: ${{ secrets.overrideCatalogDownloadToken }}