name: Main workflow

permissions:
  contents: read
  id-token: write
  packages: write
  actions: read

on:
  workflow_call:
    inputs:
      oidc-client-id:
        required: false
        type: string
      oidc-tenant-id:
        required: false
        type: string
      oidc-subscription-id:
        required: false
        type: string

      sonarcloud-project-name:
        required: true
        type: string

      configuration:
        required: false
        type: string
        default: 'Release'

      solution-filter-name:
        required: false
        type: string

      debug:
        required: false
        type: boolean
        default: false

      runs-on:
        required: false
        type: string
        default: 'ubuntu-latest'

      # One or more lines with <relative path to manifest.yml>=<catalog identifier>.
      # Example:
      #   PackageA.Install/CatalogInformation/manifest.yml=11111111-1111-1111-1111-111111111111
      #   PackageB.Install/CatalogInformation/manifest.yml=22222222-2222-2222-2222-222222222222
      override-catalog-identifiers:
        required: false
        type: string

      # NuGet push destination URL. Defaults to the GitHub Packages registry of the calling repository's owner.
      nuget-push-source:
        required: false
        type: string

    secrets:
      SONAR_TOKEN:
        required: false
      DATAMINER_TOKEN:
        required: false
      AZURE_TOKEN:
        required: false
      OVERRIDE_CATALOG_DOWNLOAD_TOKEN:
        required: false
      NUGET_API_KEY:
        required: false

env:
  VERSION_SDK: '0.0.800'
  VERSION_APPPACKAGEINSTALLER: '4.0.0'

jobs:

  check_oidc:
    name: Check OIDC
    runs-on: ubuntu-latest
    outputs:
      client-id: ${{ steps.set_oidc.outputs.client-id }}
      tenant-id: ${{ steps.set_oidc.outputs.tenant-id }}
      subscription-id: ${{ steps.set_oidc.outputs.subscription-id }}
      use-oidc: ${{ steps.set_oidc.outputs.use-oidc }}
    steps:
      - name: Set Azure OIDC parameters
        id: set_oidc
        env:
          OIDC_CLIENT_ID: ${{ inputs.oidc-client-id }}
          OIDC_TENANT_ID: ${{ inputs.oidc-tenant-id }}
          OIDC_SUBSCRIPTION_ID: ${{ inputs.oidc-subscription-id }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          echo "Determining Azure OIDC parameters..."

          if [[ -n "$OIDC_CLIENT_ID" ]]; then
            echo "Using provided OIDC parameters"
            {
              echo "client-id=$OIDC_CLIENT_ID"
              echo "tenant-id=$OIDC_TENANT_ID"
              echo "subscription-id=$OIDC_SUBSCRIPTION_ID"
              echo "use-oidc=true"
            } >> "$GITHUB_OUTPUT"
          elif [[ "$REPO_OWNER" == "SkylineCommunications" ]]; then
            echo "Using SkylineCommunications default OIDC parameters"
            {
              echo "client-id=c50da9cc-ba14-4138-8595-a62d97ab0e53"
              echo "tenant-id=5f175691-8d1c-4932-b7c8-ce990839ac40"
              echo "subscription-id=d6cbb8df-56eb-451d-9db7-67f49cba3220"
              echo "use-oidc=true"
            } >> "$GITHUB_OUTPUT"
          else
            echo "No OIDC parameters provided and owner does not match SkylineCommunications"
            echo "use-oidc=false" >> "$GITHUB_OUTPUT"
          fi

  discover_projects:
    name: Discover Project Types
    runs-on: ubuntu-latest
    outputs:
      has-dataminer-projects: ${{ steps.detect-projects.outputs.has-dataminer-projects }}
      solution-path: ${{ steps.find-solution-file.outputs.path }}
    steps:
      - uses: actions/checkout@v6

      - name: Find solution file
        id: find-solution-file
        env:
          SOLUTION_FILTER_NAME: ${{ inputs.solution-filter-name }}
        run: |
          if [[ -z "$SOLUTION_FILTER_NAME" ]]; then
            results=$(find . -type f \( -name '*.sln' -o -name '*.slnx' \))
          else
            results=$(find . -type f -name "$SOLUTION_FILTER_NAME")
          fi

          count=$(echo "$results" | grep -c .)
          if [ "$count" -eq 0 ]; then
            echo "Error: No solution file found."
            exit 1
          elif [ "$count" -gt 1 ]; then
            echo "Error: Multiple solution files found:"
            echo "$results"
            echo "Please specify a solution-filter-name input to disambiguate."
            exit 1
          fi

          echo "path=$results" >> $GITHUB_OUTPUT
        shell: bash

      - name: Detect projects with specific properties
        id: detect-projects
        run: |
          $projectFiles = Get-ChildItem -Path . -Recurse -Filter "*.csproj"
          $hasDataminerProjects = $false
   
          foreach ($project in $projectFiles) {
            [xml]$content = Get-Content $project.FullName
     
            # Check for Skyline.DataMiner.Sdk projects (based on DataMinerType property)
            if ($content.SelectNodes("//DataMinerType").Count -gt 0) {
              echo "Found at least one DataMiner project"
              $hasDataminerProjects = $true
              break
            }
          }
    
          echo "has-dataminer-projects=$($hasDataminerProjects.ToString().ToLower())" >> $env:GITHUB_OUTPUT
        shell: pwsh

  ci:
    name: CI
    needs: [check_oidc, discover_projects]
    runs-on: ${{ inputs.runs-on }}
    defaults:
      run:
        shell: bash
    outputs:
      has-nuget-packages: ${{ steps.detect-nuget-packages.outputs.has-nuget-packages }}
      has-dataminer-packages: ${{ steps.detect-dataminer-packages.outputs.has-dataminer-packages }}
    steps:
      - name: Azure Login
        uses: azure/login@v3
        if: needs.check_oidc.outputs.use-oidc == 'true'
        with:
          client-id: ${{ needs.check_oidc.outputs.client-id }}
          tenant-id: ${{ needs.check_oidc.outputs.tenant-id }}
          subscription-id: ${{ needs.check_oidc.outputs.subscription-id }}

      - name: Retrieve needed secrets from Azure Key Vault
        if: needs.check_oidc.outputs.use-oidc == 'true'
        shell: bash
        env:
          HAS_DM_PROJECTS: ${{ needs.discover_projects.outputs.has-dataminer-projects }}
        run: |
          echo "Fetching secrets from Azure Key Vault..."

          # List of secret names needed for this job
          secret_names=("azure-token" "sonar-token")

          if [[ "$HAS_DM_PROJECTS" == "true" ]]; then
            secret_names+=("dataminer-token")
          fi

          for secret_name in "${secret_names[@]}"; do
            # Convert to uppercase and replace hyphens with underscores
            env_var_name=$(echo "$secret_name" | tr '[:lower:]' '[:upper:]' | tr '-' '_')

            # Retrieve the secret value
            secret_value=$(az keyvault secret show --vault-name kv-master-cicd-secrets --name "$secret_name" --query value -o tsv)

            # Mask the secret value
            echo "::add-mask::$secret_value"

            # Export as environment variable
            echo "$env_var_name=$secret_value" >> "$GITHUB_ENV"
          done

      - name: Overwrite default secrets with user-defined secrets
        shell: bash
        env:
          USER_AZURE_TOKEN: ${{ secrets.AZURE_TOKEN }}
          USER_SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          USER_DATAMINER_TOKEN: ${{ secrets.DATAMINER_TOKEN }}
        run: |
          if [[ -n "$USER_AZURE_TOKEN" ]]; then
            echo "Using provided AZURE_TOKEN secret"
            echo "AZURE_TOKEN=$USER_AZURE_TOKEN" >> "$GITHUB_ENV"
          fi

          if [[ -n "$USER_SONAR_TOKEN" ]]; then
            echo "Using provided SONAR_TOKEN secret"
            echo "SONAR_TOKEN=$USER_SONAR_TOKEN" >> "$GITHUB_ENV"
          fi

          if [[ -n "$USER_DATAMINER_TOKEN" ]]; then
            echo "Using provided DATAMINER_TOKEN secret"
            echo "DATAMINER_TOKEN=$USER_DATAMINER_TOKEN" >> "$GITHUB_ENV"
          fi

      - name: Validate SonarCloud Project Name
        id: validate-sonar-name
        if: github.actor != 'dependabot[bot]'
        env:
          SONAR_PROJECT_NAME: ${{ inputs.sonarcloud-project-name }}
          HAS_DM_PROJECTS: ${{ needs.discover_projects.outputs.has-dataminer-projects }}
          REPO: ${{ github.repository }}
        run: |
          if [[ -z "$SONAR_PROJECT_NAME" ]]; then
            echo "Error: sonarcloud-project-name is not set."
            echo "Please create a SonarCloud project by visiting: https://sonarcloud.io/projects/create and copy the id of the project as mentioned in the sonarcloud project url."
            repo_url="https://github.com/$REPO/settings/variables/actions"
            echo "Then set a SONAR_NAME variable in your repository settings: $repo_url"
            if [[ "$HAS_DM_PROJECTS" == "true" ]]; then
              echo "Alternatively, if you do not wish to use the Skyline Quality Gate but intend to publish your results to the catalog, you may create your workflow to include the equivalent of a dotnet publish step as shown below (remove the \\):"
              echo "    - name: Publish"
              echo "      env:"
              echo "        api-key: $\{{ secrets.DATAMINER_TOKEN }}"
              echo "      run: dotnet publish -p:Version=\"0.0.$\{{ github.run_number }}\" -p:VersionComment=\"Iterative Development\" -p:CatalogPublishKeyName=api-key"
            fi
            exit 1
          fi

      - name: Validate SonarCloud Secret Token
        id: validate-sonar-token
        if: github.actor != 'dependabot[bot]'
        env:
          HAS_DM_PROJECTS: ${{ needs.discover_projects.outputs.has-dataminer-projects }}
          REPO: ${{ github.repository }}
        run: |
          if [[ -z "$SONAR_TOKEN" ]]; then
            echo "Error: sonarCloudToken is not set."
            echo "Please create a SonarCloud token by visiting: https://sonarcloud.io/account/security and copy the value of the created token."
            repo_url="https://github.com/$REPO/settings/secrets/actions"
            echo "Then set a SONAR_TOKEN secret in your repository settings: $repo_url"
            if [[ "$HAS_DM_PROJECTS" == "true" ]]; then
              echo "Alternatively, if you do not wish to use the Skyline Quality Gate but intend to publish your results to the catalog, you may create your workflow to include the equivalent of a dotnet publish step as shown below (remove the \\):"
              echo "    - name: Publish"
              echo "      env:"
              echo "        api-key: $\{{ secrets.DATAMINER_TOKEN }}"
              echo "      run: dotnet publish -p:Version=\"0.0.$\{{ github.run_number }}\" -p:VersionComment=\"Iterative Development\" -p:CatalogPublishKeyName=api-key"
            fi
            exit 1
          fi
          
      - name: Validate DataMiner Secret Token
        id: validate-dataminer-token
        if: github.ref_type == 'tag' && needs.discover_projects.outputs.has-dataminer-projects == 'true'
        env:
          REPO: ${{ github.repository }}
        run: |
          if [[ -z "$DATAMINER_TOKEN" ]]; then
            echo "Error: dataminerToken is not set. Release not possible!"
            echo "Please create or re-use an admin.dataminer.services token by visiting: https://admin.dataminer.services/."
            echo "Navigate to the right organization, then go to Keys and create or find a key with the permissions Register catalog items, Download catalog versions, and Read catalog items."
            echo "Copy the value of the token."
            repo_url="https://github.com/$REPO/settings/secrets/actions"
            echo "Then set a DATAMINER_TOKEN secret in your repository settings: $repo_url"
            exit 1
          fi

      - name: Enable long paths
        run: git config --global core.longpaths true

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache and Install Mono
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: mono-complete
      
      - name: Enable GitHub NuGet Registry
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $source = @{ Name = "PrivateGitHubNugets"; URL = "https://nuget.pkg.github.com/$env:REPO_OWNER/index.json"; Username = "USERNAME"; Password = "$env:GH_TOKEN" }

          Write-Host "Checking source $($source.Name)..."

          if (dotnet nuget list source | Select-String -Pattern $source.Name) {
            Write-Host "Updating existing source $($source.Name)."
            dotnet nuget update source $source.Name --source $source.URL --username $source.Username --password $source.Password --store-password-in-clear-text
          } else {
            Write-Host "Adding new source $($source.Name)."
            dotnet nuget add source $source.URL --name $source.Name --username $source.Username --password $source.Password --store-password-in-clear-text
          }
        shell: pwsh

      - name: Enable Skyline NuGet Registries
        if: github.repository_owner == 'SkylineCommunications'
        run: |
          $sources = @(
            @{ Name = "CloudNuGets"; URL = "https://pkgs.dev.azure.com/skyline-cloud/Cloud_NuGets/_packaging/CloudNuGet/nuget/v3/index.json"; Username = "az"; Password = "$env:AZURE_TOKEN" },
            @{ Name = "PrivateAzureNuGets"; URL = "https://pkgs.dev.azure.com/skyline-cloud/_packaging/skyline-private-nugets/nuget/v3/index.json"; Username = "az"; Password = "$env:AZURE_TOKEN" }
          )

          foreach ($source in $sources) {
            if ($source.Password -ne "") {
              Write-Host "Checking source $($source.Name)..."

              if (dotnet nuget list source | Select-String -Pattern $source.Name) {
                Write-Host "Updating existing source $($source.Name)."
                dotnet nuget update source $source.Name --source $source.URL --username $source.Username --password $source.Password --store-password-in-clear-text
              } else {
                Write-Host "Adding new source $($source.Name)."
                dotnet nuget add source $source.URL --name $source.Name --username $source.Username --password $source.Password --store-password-in-clear-text
              }
            } else {
              Write-Host "Skipping $($source.Name) because the password is not set."
            }
          }
        shell: pwsh

      - name: Install .NET tools
        env:
          GH_ACTOR: ${{ github.actor }}
          HAS_DM_PROJECTS: ${{ needs.discover_projects.outputs.has-dataminer-projects }}
        run: |
          if [[ "$GH_ACTOR" != "dependabot[bot]" ]]; then
            dotnet tool install dotnet-sonarscanner --global
          fi

          # dotnet tool install -g Skyline.DataMiner.CICD.Tools.NuGetValidateSkylineSpecifications --version 3.*
          dotnet tool install -g Skyline.DataMiner.CICD.Tools.NuGetValidateSkylineSpecifications --prerelease

          if [[ "$HAS_DM_PROJECTS" == "true" ]]; then
            if [[ "$GH_ACTOR" != "dependabot[bot]" ]]; then
              dotnet tool install Skyline.DataMiner.CICD.Tools.Sbom --global --version 1.*
            fi

            # dotnet tool install Skyline.DataMiner.CICD.Tools.NuGetChangeVersion --global --version 3.*
            dotnet tool install Skyline.DataMiner.CICD.Tools.NuGetChangeVersion --global --prerelease
          fi
        shell: bash

      - name: Validate NuGet projects
        if: github.actor != 'dependabot[bot]'
        env:
          SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          $minimal = "$env:REPO_OWNER" -ne "SkylineCommunications"
          NuGetValidateSkylineSpecifications --solution-filepath "$env:SOLUTION_PATH" --minimal $minimal
        shell: pwsh

      # ──────────────────────────────────────────────────────────────
      # A. DataMiner-specific setup
      # ──────────────────────────────────────────────────────────────

      - name: Update Skyline.DataMiner.Core.AppPackageInstaller
        if: needs.discover_projects.outputs.has-dataminer-projects == 'true'
        env:
          SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
        run: NuGetChangeVersion --solution-filepath "$SOLUTION_PATH" --nuget-name Skyline.DataMiner.Core.AppPackageInstaller --nuget-version $VERSION_APPPACKAGEINSTALLER

      - name: Update Skyline.DataMiner.Sdk version in global.json (if present)
        if: needs.discover_projects.outputs.has-dataminer-projects == 'true'
        shell: pwsh
        run: |
          $globalJsonPath = Join-Path $env:GITHUB_WORKSPACE "global.json"

          if (-Not (Test-Path $globalJsonPath)) {
            Write-Host "No global.json found. Skipping update."
            return
          }

          $jsonContent = Get-Content $globalJsonPath -Raw | ConvertFrom-Json

          if (-not $jsonContent.'msbuild-sdks') {
            $jsonContent | Add-Member -MemberType NoteProperty -Name 'msbuild-sdks' -Value @{}
          }

          $jsonContent.'msbuild-sdks'.'Skyline.DataMiner.Sdk' = $env:VERSION_SDK

          $updatedJson = $jsonContent | ConvertTo-Json -Depth 10

          $updatedJson | Set-Content $globalJsonPath -Encoding UTF8

          Write-Host "Updated global.json:"
          Write-Host $updatedJson

      - name: Update Catalog Identifiers
        if: inputs.override-catalog-identifiers != ''
        env:
          CATALOG_IDENTIFIERS: ${{ inputs.override-catalog-identifiers }}
        run: |
          $rawMappings = $env:CATALOG_IDENTIFIERS
          $mappings = $rawMappings -split '[\r\n]+' | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }

          foreach ($mapping in $mappings) {
            $splitIndex = $mapping.IndexOf('=')
            if ($splitIndex -lt 1 -or $splitIndex -eq ($mapping.Length - 1)) {
              Write-Error "Invalid entry '$mapping'. Expected format: <manifest.yml path>=<id>."
              exit 1
            }

            $manifestPath = $mapping.Substring(0, $splitIndex).Trim()
            $identifier = $mapping.Substring($splitIndex + 1).Trim()

            if ($identifier -notmatch '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$') {
              Write-Error "Identifier '$identifier' is not a valid GUID."
              exit 1
            }

            if ([System.IO.Path]::GetFileName($manifestPath) -ne 'manifest.yml') {
              Write-Error "Manifest path '$manifestPath' must point to 'manifest.yml'."
              exit 1
            }

            if (-not (Test-Path -Path $manifestPath -PathType Leaf)) {
              Write-Error "Manifest file '$manifestPath' does not exist."
              exit 1
            }

            $content = Get-Content -Path $manifestPath -Raw
            $hasActiveIdLine = [regex]::IsMatch($content, '(?m)^(?!\s*#)\s*id:\s*.*$')

            if (-not $hasActiveIdLine) {
              Write-Error "No active id line found in '$manifestPath'."
              exit 1
            }

            $updatedContent = [regex]::Replace($content, '(?m)^(?!\s*#)\s*id:\s*.*$', "id: $identifier", 1)

            if ($updatedContent -eq $content) {
              Write-Host "'$manifestPath' already has id: $identifier"
            } else {
              Set-Content -Path $manifestPath -Value $updatedContent -NoNewline
              Write-Host "Updated '$manifestPath' to id: $identifier"
            }
          }
        shell: pwsh

      - name: Apply SourceCode Url To Manifest
        if: needs.discover_projects.outputs.has-dataminer-projects == 'true'
        env:
          REPO: ${{ github.repository }}
        run: |
          $manifestFiles = Get-ChildItem -Recurse -Filter 'manifest.yml' |
              Where-Object { $_.FullName -match '[\\/]CatalogInformation[\\/]' }

          foreach ($file in $manifestFiles) {
              $lines = Get-Content -Path $file.FullName
              $updated = $false

              for ($i = 0; $i -lt $lines.Count; $i++) {
                  if ($lines[$i] -match '^\s*source_code_url:\s*$') {
                      $indent = ($lines[$i] -match '^(\s*)source_code_url:')[1]
                      $lines[$i] = "$indent" + "source_code_url: 'https://github.com/$env:REPO'"
                      $updated = $true
                      break
                  }
              }

              if ($updated) {
                  Write-Host "Updating: $($file.FullName) with 'source_code_url: https://github.com/$env:REPO'"
                  Set-Content -Path $file.FullName -Value $lines -Encoding UTF8
              }
          }
        shell: pwsh

      - name: Detect test runner mode
        id: detect-test-mode
        shell: pwsh
        run: |
          $globalJsonPath = Join-Path $env:GITHUB_WORKSPACE "global.json"

          if (Test-Path $globalJsonPath) {
            $jsonContent = Get-Content $globalJsonPath -Raw | ConvertFrom-Json
            $runner = $jsonContent.test.runner

            if ($runner -eq "Microsoft.Testing.Platform") {
              Write-Host "Detected Microsoft.Testing.Platform (MTP) test runner in global.json"
              echo "test-runner-mode=mtp" >> $env:GITHUB_OUTPUT
              return
            }
          }

          Write-Host "Using default VSTest test runner"
          echo "test-runner-mode=vstest" >> $env:GITHUB_OUTPUT

      # ──────────────────────────────────────────────────────────────
      # B. SonarCloud analysis (skipped for Dependabot)
      # ──────────────────────────────────────────────────────────────

      - name: Prepare SonarCloud Variables
        if: github.actor != 'dependabot[bot]'
        id: prepSonarCloudVar
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "lowerCaseOwner=${OWNER,,}" >> "$GITHUB_ENV"

      - name: Get SonarCloud Status
        if: github.actor != 'dependabot[bot]'
        id: get-sonarcloud-status
        env:
          SONAR_PROJECT_NAME: ${{ inputs.sonarcloud-project-name }}
          BRANCH_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          sonarCloudProjectStatus=$(curl -s -u "$SONAR_TOKEN:" "https://sonarcloud.io/api/qualitygates/project_status?projectKey=$SONAR_PROJECT_NAME&branch=$BRANCH_NAME")

          # Check if the response is empty or not valid JSON
          if [ -z "$sonarCloudProjectStatus" ] || ! echo "$sonarCloudProjectStatus" | jq . > /dev/null 2>&1; then
            echo "Error: The SONAR_TOKEN is invalid, expired, or the response is empty. Please check: https://sonarcloud.io/account/security and update your token: https://github.com/$REPO/settings/secrets/actions" >&2
            echo "Returned response: $sonarCloudProjectStatus" >&2
            exit 1
          fi

          # Check if the response contains errors
          if echo "$sonarCloudProjectStatus" | jq -e '.errors' > /dev/null 2>&1; then
            echo "Error: SonarCloud API returned errors. Initial analysis needed." >&2
            echo "Returned response: $sonarCloudProjectStatus" >&2
            echo "needsInitialAnalysis=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if project status is NONE (needs initial analysis)
          projectStatus=$(echo "$sonarCloudProjectStatus" | jq -r '.projectStatus.status // empty')
          if [ "$projectStatus" = "NONE" ]; then
            echo "Project status is NONE. Initial analysis needed."
            echo "needsInitialAnalysis=true" >> $GITHUB_OUTPUT
          else
            echo "needsInitialAnalysis=false" >> $GITHUB_OUTPUT
          fi

          # Output the JSON response if valid
          echo "Returned response: $sonarCloudProjectStatus"
        shell: bash

      - name: Trigger Initial Analysis
        if: github.actor != 'dependabot[bot]' && steps.get-sonarcloud-status.outputs.needsInitialAnalysis == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_PROJECT_NAME: ${{ inputs.sonarcloud-project-name }}
          BRANCH_NAME: ${{ github.ref_name }}
          SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
          CONFIGURATION: ${{ inputs.configuration }}
          MSYS_NO_PATHCONV: '1'
        run: |
            dotnet sonarscanner begin \
              /k:"$SONAR_PROJECT_NAME" \
              /o:"$lowerCaseOwner" \
              /d:sonar.token="$SONAR_TOKEN" \
              /d:sonar.host.url="https://sonarcloud.io" \
              /d:sonar.exclusions="**/*.yml,**/*.xml" \
              /d:sonar.branch.name="$BRANCH_NAME"
            dotnet build "$SOLUTION_PATH" \
              -p:GenerateDataMinerPackage=false \
              -p:GeneratePackageOnBuild=false \
              --configuration "$CONFIGURATION" \
              -nodeReuse:false \
              -p:WarningLevel=0
            dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
        continue-on-error: true

      - name: Start Analysis
        if: github.actor != 'dependabot[bot]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_PROJECT_NAME: ${{ inputs.sonarcloud-project-name }}
          BRANCH_NAME: ${{ github.ref_name }}
          MSYS_NO_PATHCONV: '1'
        run: |
            dotnet sonarscanner begin \
              /k:"$SONAR_PROJECT_NAME" \
              /o:"$lowerCaseOwner" \
              /d:sonar.token="$SONAR_TOKEN" \
              /d:sonar.host.url="https://sonarcloud.io" \
              /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml" \
              /d:sonar.cs.vscoveragexml.reportsPaths="**/TestResults/**/coverage.xml" \
              /d:sonar.cs.vstest.reportsPaths="**/TestResults/**.trx" \
              /d:sonar.exclusions="**/*.yml,**/*.xml" \
              /d:sonar.branch.name="$BRANCH_NAME"
        continue-on-error: true

      # ──────────────────────────────────────────────────────────────
      # C. Build
      # ──────────────────────────────────────────────────────────────

      - name: Determine version
        id: determine-version
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [[ "$REF_TYPE" == "tag" ]]; then
            echo "version=$REF_NAME" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.$RUN_NUMBER" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Build
        env:
          OVERRIDE_CATALOG_DOWNLOAD_TOKEN: ${{ secrets.OVERRIDE_CATALOG_DOWNLOAD_TOKEN }}
          SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
          VERSION: ${{ steps.determine-version.outputs.version }}
          CONFIGURATION: ${{ inputs.configuration }}
          DEBUG_FLAG: ${{ inputs.debug }}
        run: |
          dotnet build "$SOLUTION_PATH" \
            -p:Version="$VERSION" \
            -p:PackageVersion="$VERSION" \
            -p:DefineConstants="DCFv1%3BDBInfo%3BALARM_SQUASHING" \
            --configuration "$CONFIGURATION" \
            -p:CatalogPublishKeyName="DATAMINER_TOKEN" \
            -p:CatalogDefaultDownloadKeyName="OVERRIDE_CATALOG_DOWNLOAD_TOKEN" \
            -p:SkylineDataMinerSdkDebug="$DEBUG_FLAG" \
            -nodeReuse:false

      # ──────────────────────────────────────────────────────────────
      # D. Test & Quality Gate
      # ──────────────────────────────────────────────────────────────
      - name: Unit Tests (VSTest)
        id: unit-tests-vstest
        if: steps.detect-test-mode.outputs.test-runner-mode == 'vstest'
        env:
          SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
          CONFIGURATION: ${{ inputs.configuration }}
        shell: bash
        run: |
          while IFS= read -r project; do
            [[ "$project" == *".Integration"* ]] && continue

            dotnet test "$project" \
              --no-build \
              --configuration "$CONFIGURATION" \
              --filter "TestCategory!=IntegrationTest&TestCategory!=IntegrationTests" \
              --logger "trx;logfilename=$(basename "$project" .csproj).trx" \
              --results-directory "TestResults" \
              --collect "XPlat Code Coverage" \
              -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura,opencover
          done < <(dotnet sln "$SOLUTION_PATH" list | tail -n +3 | grep '\.csproj$')

      - name: Unit Tests (MTP)
        id: unit-tests-mtp
        if: steps.detect-test-mode.outputs.test-runner-mode == 'mtp'
        env:
          SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
          CONFIGURATION: ${{ inputs.configuration }}
        shell: bash
        run: |
          while IFS= read -r project; do
            [[ "$project" == *".Integration"* ]] && continue

            dotnet test "$project" \
              --no-build \
              --configuration "$CONFIGURATION" \
              --filter "TestCategory!=IntegrationTest&TestCategory!=IntegrationTests" \
              --results-directory "TestResults" \
              --report-trx \
              --report-trx-filename "$(basename "$project" .csproj).trx" \
              --coverage \
              --coverage-output-format xml \
              --coverage-output "TestResults/$(basename "$project" .csproj).coverage.xml" \
              --ignore-exit-code 8
          done < <(dotnet sln "$SOLUTION_PATH" list | tail -n +3 | grep '\.csproj$')
          
      # - name: Unit Tests (VSTest)
      #   id: unit-tests-vstest
      #   if: steps.detect-test-mode.outputs.test-runner-mode == 'vstest'
      #   env:
      #     SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
      #     CONFIGURATION: ${{ inputs.configuration }}
      #   run: |
      #     dotnet test "$SOLUTION_PATH" \
      #       --no-build \
      #       --configuration "$CONFIGURATION" \
      #       --filter "TestCategory!=IntegrationTest&TestCategory!=IntegrationTests" \
      #       --logger "trx;logfilename=unitTestResults.trx" \
      #       --collect "XPlat Code Coverage" \
      #       -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura,opencover

      # - name: Unit Tests (MTP)
      #   id: unit-tests-mtp
      #   if: steps.detect-test-mode.outputs.test-runner-mode == 'mtp'
      #   env:
      #     SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
      #     CONFIGURATION: ${{ inputs.configuration }}
      #   run: |
      #     dotnet test \
      #       --solution "$SOLUTION_PATH" \
      #       --no-build \
      #       --configuration "$CONFIGURATION" \
      #       --filter "TestCategory!=IntegrationTest&TestCategory!=IntegrationTests" \
      #       --report-trx \
      #       --report-trx-filename unitTestResults.trx \
      #       --coverage \
      #       --coverage-output-format xml \
      #       --coverage-output coverage.xml \
      #       --ignore-exit-code 8

      - name: Stop Analysis
        if: github.actor != 'dependabot[bot]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MSYS_NO_PATHCONV: '1'
        run: |
            dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
        continue-on-error: true

      - name: SonarCloud Quality Gate check
        if: github.actor != 'dependabot[bot]'
        id: sonarcloud-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@cb3ed20f9fec62b4c3b8ad9e77656c6adaade913 # Master from 17 Nov 2025
        with:
          scanMetadataReportFile: .sonarqube/out/.sonar/report-task.txt
        continue-on-error: true
        timeout-minutes: 5

      - name: Quality Gate
        id: quality-step
        env:
          GH_ACTOR: ${{ github.actor }}
          TEST_VSTEST_OUTCOME: ${{ steps.unit-tests-vstest.outcome }}
          TEST_MTP_OUTCOME: ${{ steps.unit-tests-mtp.outcome }}
          QG_STATUS: ${{ steps.sonarcloud-quality-gate-check.outputs.quality-gate-status }}
          QG_OUTCOME: ${{ steps.sonarcloud-quality-gate-check.outcome }}
        run: |
          import os
          is_dependabot = os.environ["GH_ACTOR"] == "dependabot[bot]"

          test_outcome_vstest = os.environ["TEST_VSTEST_OUTCOME"]
          test_outcome_mtp = os.environ["TEST_MTP_OUTCOME"]
          test_failed = test_outcome_vstest == "failure" or test_outcome_mtp == "failure"

          if test_failed:
            print("Quality gate failed due to:")
            print("- Test failures")

          if not is_dependabot:
            if os.environ["QG_STATUS"] == "FAILED":
              print("Quality gate failed due to:")
              print("- Code analysis quality gate failed")
            if os.environ["QG_OUTCOME"] == "failure" and os.environ["QG_STATUS"] != "FAILED":
              print("- Could not retrieve SonarCloud quality gate status, potentially due to reaching License max LoC. Ignoring SonarCloud quality gate status in this case.")

          if test_failed:
            exit(1)
          if not is_dependabot and os.environ["QG_STATUS"] == "FAILED":
            exit(1)
        shell: python

      # ──────────────────────────────────────────────────────────────
      # E. Artifacts & Outputs
      # ──────────────────────────────────────────────────────────────

      - name: Detect NuGet packages
        if: github.actor != 'dependabot[bot]'
        id: detect-nuget-packages
        env:
          CONFIGURATION: ${{ inputs.configuration }}
        run: |
          nuget_count=$(find . -path "*/bin/$CONFIGURATION/*.nupkg" | wc -l)
          if [ "$nuget_count" -gt 0 ]; then
            echo "Found $nuget_count NuGet package(s)"
            echo "has-nuget-packages=true" >> $GITHUB_OUTPUT
          else
            echo "No NuGet packages found"
            echo "has-nuget-packages=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Upload NuGet packages
        if: github.actor != 'dependabot[bot]' && steps.detect-nuget-packages.outputs.has-nuget-packages == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: NugetPackages
          path: |
            **/bin/${{ inputs.configuration }}/**/*.nupkg

      - name: Detect DataMiner packages
        if: github.actor != 'dependabot[bot]'
        id: detect-dataminer-packages
        run: |
          dm_count=$(find . -type f \( -name "*.dmapp" -o -name "*.dmtest" \) | wc -l)
          if [ "$dm_count" -gt 0 ]; then
            echo "Found $dm_count DataMiner package(s)"
            echo "has-dataminer-packages=true" >> $GITHUB_OUTPUT
          else
            echo "No DataMiner packages found"
            echo "has-dataminer-packages=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Create package name
        if: github.actor != 'dependabot[bot]' && steps.detect-dataminer-packages.outputs.has-dataminer-packages == 'true'
        id: packageName
        env:
          REPO: ${{ github.repository }}
        run: |
          $tempName = "$env:REPO"
          $safeName = $tempName -replace '[\"\/\\<>|:*?]', '_'
          echo "name=$safeName" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Generate SBOM file
        if: github.actor != 'dependabot[bot]' && steps.detect-dataminer-packages.outputs.has-dataminer-packages == 'true'
        env:
          SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
          PACKAGE_NAME: ${{ steps.packageName.outputs.name }}
          PACKAGE_VERSION: ${{ github.ref_name }}
          DEBUG_FLAG: ${{ inputs.debug }}
        run: |
          find . -type f \( -name "*.dmapp" -o -name "*.dmtest" \) -print0 | while IFS= read -r -d '' file; do
            echo "Generating SBOM for $file"
            dataminer-sbom generate-and-add \
              --solution-path "$SOLUTION_PATH" \
              --package-file "$file" \
              --package-name "$PACKAGE_NAME" \
              --package-version "$PACKAGE_VERSION" \
              --package-supplier "Skyline Communications" \
              --debug "$DEBUG_FLAG"
          done

      - name: Upload DataMiner packages
        if: github.actor != 'dependabot[bot]' && steps.detect-dataminer-packages.outputs.has-dataminer-packages == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: DataMiner Installation Packages (${{ inputs.configuration }} ${{ inputs.solution-filter-name }}) unsigned
          path: |
            **/bin/${{ inputs.configuration }}/*.dmapp
            **/bin/${{ inputs.configuration }}/*.dmtest
            **/bin/${{ inputs.configuration }}/*.zip
            **/bin/${{ inputs.configuration }}/**/*.dmapp
            **/bin/${{ inputs.configuration }}/**/*.dmtest
            **/bin/${{ inputs.configuration }}/**/*.zip
        continue-on-error: true

  # ════════════════════════════════════════════════════════════════
  # NuGet Signing (Windows required: https://github.com/dotnet/runtime/issues/48794)
  # ════════════════════════════════════════════════════════════════

  sign_nuget:
    name: Sign NuGet Packages
    if: needs.ci.outputs.has-nuget-packages == 'true' && github.actor != 'dependabot[bot]'
    runs-on: windows-latest
    needs: [ci, check_oidc]
    steps:
      - name: Azure Login
        uses: azure/login@v3
        if: needs.check_oidc.outputs.use-oidc == 'true'
        with:
          client-id: ${{ needs.check_oidc.outputs.client-id }}
          tenant-id: ${{ needs.check_oidc.outputs.tenant-id }}
          subscription-id: ${{ needs.check_oidc.outputs.subscription-id }}

      - name: Retrieve signing secrets from Azure Key Vault
        if: needs.check_oidc.outputs.use-oidc == 'true'
        shell: bash
        run: |
          echo "Fetching secrets from Azure Key Vault..."

          secret_names=("signing-client-id" "signing-client-secret" "signing-tenant-id" "signing-key-vault-certificate" "signing-key-vault-url")

          for secret_name in "${secret_names[@]}"; do
            env_var_name=$(echo "$secret_name" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
            secret_value=$(az keyvault secret show --vault-name kv-master-cicd-secrets --name "$secret_name" --query value -o tsv)
            echo "::add-mask::$secret_value"
            echo "$env_var_name=$secret_value" >> "$GITHUB_ENV"
          done

      - name: Download Unsigned NuGet
        uses: actions/download-artifact@v8
        with:
          name: NugetPackages
          path: _NuGetResults

      - name: Install dotnet sign
        if: needs.check_oidc.outputs.use-oidc == 'true'
        run: dotnet tool install sign --global --prerelease

      - name: Sign NuGet Package
        if: needs.check_oidc.outputs.use-oidc == 'true'
        env:
          AZURE_TENANT_ID: ${{ env.SIGNING_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ env.SIGNING_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ env.SIGNING_CLIENT_SECRET }}
        run: |
          IFS=$'\n'
          sign code azure-key-vault "_NuGetResults/**/*.nupkg" --publisher-name "Skyline Communications" --description "Skyline Signing" --description-url "https://www.skyline.be/" --azure-key-vault-certificate "$SIGNING_KEY_VAULT_CERTIFICATE" --azure-key-vault-url "$SIGNING_KEY_VAULT_URL" --output "_SignedNuGetResults"
          unset IFS
        shell: bash

      - name: Upload Signed NuGet
        if: needs.check_oidc.outputs.use-oidc == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: SignedNugetPackages
          path: "${{ github.workspace }}/_SignedNuGetResults"

      - name: Upload Unsigned NuGet (signing not available)
        if: needs.check_oidc.outputs.use-oidc != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: SignedNugetPackages
          path: "${{ github.workspace }}/_NuGetResults"

  # ════════════════════════════════════════════════════════════════
  # NuGet Push (on tag only)
  # ════════════════════════════════════════════════════════════════

  push_nuget:
    name: Push NuGet Packages
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    needs: [sign_nuget, check_oidc]
    steps:
      - name: Azure Login
        uses: azure/login@v3
        if: needs.check_oidc.outputs.use-oidc == 'true'
        with:
          client-id: ${{ needs.check_oidc.outputs.client-id }}
          tenant-id: ${{ needs.check_oidc.outputs.tenant-id }}
          subscription-id: ${{ needs.check_oidc.outputs.subscription-id }}

      - name: Retrieve needed secrets from Azure Key Vault
        if: needs.check_oidc.outputs.use-oidc == 'true'
        shell: bash
        run: |
          echo "Fetching secrets from Azure Key Vault..."

          secret_names=("nuget-api-key-github")

          for secret_name in "${secret_names[@]}"; do
            env_var_name=$(echo "$secret_name" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
            secret_value=$(az keyvault secret show --vault-name kv-master-cicd-secrets --name "$secret_name" --query value -o tsv)
            echo "::add-mask::$secret_value"
            echo "$env_var_name=$secret_value" >> "$GITHUB_ENV"
          done

      - name: Overwrite default secrets with user-defined secrets
        shell: bash
        env:
          USER_NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [[ -n "$USER_NUGET_API_KEY" ]]; then
            echo "Using provided NUGET_API_KEY secret"
            echo "NUGET_API_KEY_GITHUB=$USER_NUGET_API_KEY" >> "$GITHUB_ENV"
          fi

      - name: Download Signed NuGet
        uses: actions/download-artifact@v8
        with:
          name: SignedNugetPackages
          path: _SignedNuGetResults

      - name: Find NuGet packages
        id: findcreatednuget
        run: |
          {
            echo "nugetPackageName<<EOF"
            find _SignedNuGetResults -type f -name '*.nupkg'
            echo "EOF"
          } >> $GITHUB_OUTPUT
        shell: bash

      - name: Push NuGet packages
        env:
          PUSH_SOURCE_INPUT: ${{ inputs.nuget-push-source }}
          REPO_OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAMES: ${{ steps.findcreatednuget.outputs.nugetPackageName }}
        run: |
          # Determine push source
          PUSH_SOURCE="$PUSH_SOURCE_INPUT"
          if [ -z "$PUSH_SOURCE" ]; then
            PUSH_SOURCE="https://nuget.pkg.github.com/$REPO_OWNER/index.json"
          fi

          # Determine API key: use OIDC/user-provided key, else fall back to GITHUB_TOKEN
          API_KEY="$NUGET_API_KEY_GITHUB"
          if [ -z "$API_KEY" ]; then
            API_KEY="$GH_TOKEN"
          fi

          IFS=$'\n'
          for i in $PACKAGE_NAMES;
          do
              dotnet nuget push "$i" --api-key "$API_KEY" --source "$PUSH_SOURCE"
          done
          unset IFS
        shell: bash

  # ════════════════════════════════════════════════════════════════
  # DataMiner Catalog Upload (on tag only)
  # ════════════════════════════════════════════════════════════════

  upload_to_catalog:
    name: Upload to Catalog
    runs-on: windows-latest
    if: github.ref_type == 'tag' && needs.ci.outputs.has-dataminer-packages == 'true'
    needs: [ci, check_oidc, discover_projects]
    steps:
      - name: Azure Login
        uses: azure/login@v3
        if: needs.check_oidc.outputs.use-oidc == 'true'
        with:
          client-id: ${{ needs.check_oidc.outputs.client-id }}
          tenant-id: ${{ needs.check_oidc.outputs.tenant-id }}
          subscription-id: ${{ needs.check_oidc.outputs.subscription-id }}

      - name: Retrieve needed secrets from Azure Key Vault
        if: needs.check_oidc.outputs.use-oidc == 'true'
        shell: bash
        run: |
          echo "Fetching secrets from Azure Key Vault..."

          secret_names=("dataminer-token" "signing-client-id" "signing-client-secret" "signing-tenant-id" "signing-key-vault-certificate" "signing-key-vault-url")

          for secret_name in "${secret_names[@]}"; do
            env_var_name=$(echo "$secret_name" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
            secret_value=$(az keyvault secret show --vault-name kv-master-cicd-secrets --name "$secret_name" --query value -o tsv)
            echo "::add-mask::$secret_value"
            echo "$env_var_name=$secret_value" >> "$GITHUB_ENV"
          done

      - name: Overwrite default secrets with user-defined secrets
        shell: bash
        env:
          USER_DATAMINER_TOKEN: ${{ secrets.DATAMINER_TOKEN }}
        run: |
          if [[ -n "$USER_DATAMINER_TOKEN" ]]; then
            echo "Using provided DATAMINER_TOKEN secret"
            echo "DATAMINER_TOKEN=$USER_DATAMINER_TOKEN" >> "$GITHUB_ENV"
          fi

      - name: Enable long paths
        run: git config --global core.longpaths true

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifact from CI
        uses: actions/download-artifact@v8
        with:
          name: DataMiner Installation Packages (${{ inputs.configuration }} ${{ inputs.solution-filter-name }}) unsigned
          path: downloaded_artifacts

      - name: Restore artifact contents to bin folders
        run: |
          Write-Output "Restoring DataMiner package files to original structure..."

          $downloadRoot = Resolve-Path "downloaded_artifacts"
          $workspaceRoot = Resolve-Path "."

          Get-ChildItem -Path $downloadRoot -Recurse -File | Where-Object { $_.Extension -in '.zip', '.dmapp', '.dmtest' } | ForEach-Object {
              $archiveFile = $_.FullName
              $relativePath = $archiveFile.Substring($downloadRoot.Path.Length + 1) -replace '\\', '/'
              $targetPath = Join-Path $workspaceRoot $relativePath

              $targetFolder = Split-Path $targetPath
              if (-not (Test-Path $targetFolder)) {
                  New-Item -ItemType Directory -Path $targetFolder -Force | Out-Null
              }

              Move-Item -Path $archiveFile -Destination $targetPath -Force
              Write-Output "Moved $relativePath to workspace root"
          }

          Write-Output "Removing downloaded_artifacts folder..."
          Remove-Item -Path $downloadRoot -Recurse -Force
          Write-Output "Cleanup complete."
        shell: pwsh

      - name: Install Tools
        if: needs.check_oidc.outputs.use-oidc == 'true'
        run: |
          dotnet tool install Skyline.DataMiner.CICD.Tools.PackageSign --global --version 2.*

      - name: Sign generated dmapp/dmtest packages
        if: needs.check_oidc.outputs.use-oidc == 'true'
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ env.SIGNING_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ env.SIGNING_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ env.SIGNING_CLIENT_SECRET }}
          AZURE_KEY_VAULT_URL: ${{ env.SIGNING_KEY_VAULT_URL }}
          AZURE_KEY_VAULT_CERTIFICATE: ${{ env.SIGNING_KEY_VAULT_CERTIFICATE }}
          DEBUG_FLAG: ${{ inputs.debug }}
        run: |
          dataminer-package-signature sign dmapp `
            --package-location "$env:GITHUB_WORKSPACE" `
            --debug $env:DEBUG_FLAG

      - name: Authenticate with GitHub CLI
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          "$env:GH_TOKEN" | gh auth login --with-token

      - name: Find Version Comment
        id: findVersionComment
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "Checking for release notes associated with the reference: '$REF_NAME'"

          RELEASE_INFO=$(gh release view "$REF_NAME" --json body,name 2>/dev/null || echo "{}")
          RELEASE_NOTE=$(echo "$RELEASE_INFO" | jq -r '.body // ""' 2>/dev/null || echo "")
          RELEASE_TITLE=$(echo "$RELEASE_INFO" | jq -r '.name // ""' 2>/dev/null || echo "")

          escape_special_chars() {
            echo "$1" | sed -e 's/,/%2c/g' -e 's/"/%22/g' -e 's/;/%3b/g'
          }

          if [[ -n "$RELEASE_NOTE" ]]; then
            ESCAPED_RELEASE_NOTE=$(escape_special_chars "$RELEASE_NOTE")
            echo "Release description found for '$REF_NAME': $ESCAPED_RELEASE_NOTE"
            echo "versionComment<<EOF" >> $GITHUB_OUTPUT
            echo "$ESCAPED_RELEASE_NOTE" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          elif [[ -n "$RELEASE_TITLE" ]]; then
            ESCAPED_RELEASE_TITLE=$(escape_special_chars "$RELEASE_TITLE")
            echo "Release title found for '$REF_NAME': $ESCAPED_RELEASE_TITLE"
            echo "versionComment=$ESCAPED_RELEASE_TITLE" >> $GITHUB_OUTPUT
          else
            echo "No release description or title found for '$REF_NAME'. Falling back to tag or commit message."
            VERSION_COMMENT=$(git describe --tags --exact-match 2>/dev/null || git log -1 --pretty=format:%s)
            ESCAPED_VERSION_COMMENT=$(escape_special_chars "$VERSION_COMMENT")
            echo "Fallback version comment: $ESCAPED_VERSION_COMMENT"
            echo "versionComment=$ESCAPED_VERSION_COMMENT" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Update Skyline.DataMiner.Sdk version in global.json (if present)
        shell: pwsh
        run: |
          $globalJsonPath = Join-Path $env:GITHUB_WORKSPACE "global.json"

          if (-Not (Test-Path $globalJsonPath)) {
            Write-Host "No global.json found. Skipping update."
            return
          }

          $jsonContent = Get-Content $globalJsonPath -Raw | ConvertFrom-Json

          if (-not $jsonContent.'msbuild-sdks') {
            $jsonContent | Add-Member -MemberType NoteProperty -Name 'msbuild-sdks' -Value @{}
          }

          $jsonContent.'msbuild-sdks'.'Skyline.DataMiner.Sdk' = $env:VERSION_SDK

          $updatedJson = $jsonContent | ConvertTo-Json -Depth 10

          $updatedJson | Set-Content $globalJsonPath -Encoding UTF8

          Write-Host "Updated global.json:"
          Write-Host $updatedJson

      - name: Publish To Catalog
        shell: pwsh
        env:
          SOLUTION_PATH: ${{ needs.discover_projects.outputs.solution-path }}
          VERSION: ${{ github.ref_name }}
          VERSION_COMMENT: ${{ steps.findVersionComment.outputs.versionComment }}
          CONFIGURATION: ${{ inputs.configuration }}
          DEBUG_FLAG: ${{ inputs.debug }}
        run: |
          dotnet publish `
            "$env:SOLUTION_PATH" `
            --no-build `
            -p:Version="$env:VERSION" `
            -p:VersionComment="$env:VERSION_COMMENT" `
            -p:CatalogPublishKeyName="DATAMINER_TOKEN" `
            --configuration "$env:CONFIGURATION" `
            -p:SkylineDataMinerSdkDebug="$env:DEBUG_FLAG" `
            -p:IsPublishable=false