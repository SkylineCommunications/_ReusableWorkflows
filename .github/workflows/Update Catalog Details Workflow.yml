name: Update Catalog Details

# Needed for OIDC, checkout, git-push, ...
permissions: write-all

on:
  workflow_call:
    inputs:
      # Optional OIDC inputs in case outside SkylineCommunications organization
      oidc-client-id:
        required: false
        type: string
      oidc-tenant-id:
        required: false
        type: string
      oidc-subscription-id:
        required: false
        type: string

      debug:
        required: false
        type: boolean

    secrets:
      api-key:
        required: false

jobs:

  validate_trigger:
    name: Validate Trigger
    runs-on: ubuntu-latest
    steps:
      - uses: SkylineCommunications/_ReusableWorkflows/.github/actions/guard-trigger@AI

  check_oidc:
    name: Check OIDC
    needs: [validate_trigger]
    runs-on: ubuntu-latest
    outputs:
      client-id: ${{ steps.resolve.outputs.client-id }}
      tenant-id: ${{ steps.resolve.outputs.tenant-id }}
      subscription-id: ${{ steps.resolve.outputs.subscription-id }}
      use-oidc: ${{ steps.resolve.outputs.use-oidc }}
    steps:
      - id: resolve
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/resolve-oidc@AI
        with:
          client-id: ${{ inputs.oidc-client-id }}
          tenant-id: ${{ inputs.oidc-tenant-id }}
          subscription-id: ${{ inputs.oidc-subscription-id }}
          repository-owner: ${{ github.repository_owner }}

  update_catalog_details:
      name: Update Catalog Details
      runs-on: ubuntu-latest
      needs: check_oidc
      steps:
        - name: Azure Login
          uses: azure/login@v3
          if: needs.check_oidc.outputs.use-oidc == 'true'
          with:
            client-id: ${{ needs.check_oidc.outputs.client-id }}
            tenant-id: ${{ needs.check_oidc.outputs.tenant-id }}
            subscription-id: ${{ needs.check_oidc.outputs.subscription-id }}

        - name: Load secrets
          uses: SkylineCommunications/_ReusableWorkflows/.github/actions/load-secrets@AI
          with:
            use-oidc: ${{ needs.check_oidc.outputs.use-oidc }}
            secret-names: |
              dataminer-token
            overrides: |
              DATAMINER_TOKEN=${{ secrets.api-key }}

        - name: Enable long paths
          run: git config --global core.longpaths true

        - uses: actions/checkout@v6

        - name: Install .NET Tools
          run: |
            dotnet tool install -g Skyline.DataMiner.CICD.Tools.CatalogUpload --version 4.*
            dotnet tool install -g Skyline.DataMiner.CICD.Tools.GitHubToCatalogYaml --version 2.*

        - name: Create or Extend Catalog.yml
          run: |
            github-to-catalog-yaml \
              --workspace "${{ github.workspace }}" \
              --github-token ${{ secrets.GITHUB_TOKEN }} \
              --github-repository "${{ github.repository }}" \
              --catalog-identifier "${{ vars.catalogIdentifier }}" \
              --debug "${{ inputs.debug }}"

        - name: Check if catalog.yml or manifest.yml exists
          id: check_files
          shell: pwsh
          run: |
            if (Test-Path "${{ github.workspace }}/catalog.yml") {
              echo "catalogDetails=catalog.yml" >> $env:GITHUB_ENV
            }
            elseif (Test-Path "${{ github.workspace }}/manifest.yml") {
              echo "catalogDetails=manifest.yml" >> $env:GITHUB_ENV
            }
            else {
              Write-Host "No valid file found!"
              exit 1
            }

        - uses: actions/upload-artifact@v7
          if: env.catalogDetails != ''
          with:
            name: Catalog Details
            path: "${{ github.workspace }}/${{ env.catalogDetails }}"

        - name: Commit .githubtocatalog/auto-generated-catalog
          shell: pwsh
          run: |
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add "${{ github.workspace }}/.githubtocatalog/auto-generated-catalog.yml"

            # Check if there are any changes to be committed
            git diff --staged --quiet
            if ($LASTEXITCODE -ne 0) {
              git commit -m "auto-generated"
            }
            else {
              Write-Host "No changes to commit."
            }

        - name: Push .githubtocatalog/auto-generated-catalog
          run: |
            git push
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        - name: Upload to Catalog
          shell: pwsh
          run: |
            dataminer-catalog-upload update-catalog-details `
              --path-to-catalog-yml "${{ github.workspace }}/${{ env.catalogDetails }}" `
              --dm-catalog-token "${{ env.DATAMINER_TOKEN }}" `
              --debug "${{ inputs.debug }}"