name: Connector Master Workflow

on:
  workflow_call:
    outputs:
      quality_gate:
        description: "Results from Skyline Quality Gate."
        value: ${{ jobs.validate_skyline_quality_gate.outputs.quality }}

    inputs:
      # Optional OIDC inputs in case outside SkylineCommunications organization
      oidc-client-id:
        required: false
        type: string
      oidc-tenant-id:
        required: false
        type: string
      oidc-subscription-id:
        required: false
        type: string
      use-oidc:
        required: false
        type: string

      sonarCloudProjectName:
        required: true
        type: string
      debug:
        required: false
        type: boolean

    secrets:
      api-key:
        required: false
      sonarCloudToken:
        required: false
      azureToken:
        required: false

jobs:

  validate_trigger:
    name: Validate Trigger
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: SkylineCommunications/_ReusableWorkflows/.github/actions/guard-trigger@main

  validate_skyline_quality_gate:
    name: SDK Skyline Quality Gate
    needs: [validate_trigger]
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      packages: read
    outputs:
      quality: ${{ steps.quality-step.outputs.results }}
    steps:
      - name: Azure Login
        uses: azure/login@v3
        if: inputs.use-oidc == 'true'
        with:
          client-id: ${{ inputs.oidc-client-id }}
          tenant-id: ${{ inputs.oidc-tenant-id }}
          subscription-id: ${{ inputs.oidc-subscription-id }}

      - name: Load secrets
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/load-secrets@main
        with:
          use-oidc: ${{ inputs.use-oidc }}
          secret-names: |
            azure-token
            sonar-token
            dataminer-token
          overrides: |
            AZURE_TOKEN=${{ secrets.azureToken }}
            SONAR_TOKEN=${{ secrets.sonarCloudToken }}
            DATAMINER_TOKEN=${{ secrets.api-key }}

      - name: Enable long paths
        run: git config --global core.longpaths true

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'zulu'
 
      - name: Find solution file
        id: findSlnFile
        run: |
          echo solutionFilePath=$(find . -type f -name '*.sln' -o -name '*.slnx') >> $GITHUB_OUTPUT
        shell: bash

      - name: Setup NuGet sources
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/setup-nuget-sources@main
        with:
          repository-owner: ${{ github.repository_owner }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          azure-token: ${{ env.AZURE_TOKEN }}

      - name: Install .NET Tools
        run: |
          dotnet tool install -g dotnet-sonarscanner
          dotnet tool install -g Skyline.DataMiner.CICD.Tools.Validator --version 3.*
          dotnet tool install -g Skyline.DataMiner.CICD.Tools.Sbom --version 1.*
  
      - name: Prepare SonarCloud Variables
        id: prepSonarCloudVar
        run: |
          import os
          env_file = os.getenv('GITHUB_ENV')
          with open(env_file, "a") as myfile:
              myfile.write("lowerCaseOwner=" + str.lower("${{ github.repository_owner }}"))
        shell: python

      - name: Get SonarCloud Status
        id: get-sonarcloud-status
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/sonarcloud-status@main
        with:
          project-key: ${{ inputs.sonarCloudProjectName }}
          branch: ${{ github.ref_name }}
          token: ${{ env.SONAR_TOKEN }}
          repository: ${{ github.repository }}

      - name: Trigger Initial Analysis
        if: steps.get-sonarcloud-status.outputs.needs-initial-analysis == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
        run: |
            dotnet sonarscanner begin `
              /k:"${{ inputs.sonarCloudProjectName }}" `
              /o:"${{ env.lowerCaseOwner }}" `
              /d:sonar.token="${{ env.SONAR_TOKEN }}" `
              /d:sonar.host.url="https://sonarcloud.io" `
              /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml" `
              /d:sonar.cs.vstest.reportsPaths="**/TestResults/**.trx" `
              /d:sonar.exclusions="**/*.yml,**/*.xml" `
              /d:sonar.branch.name="${{ github.ref_name }}"
            dotnet build "${{ steps.findSlnFile.outputs.solutionFilePath }}" -p:DefineConstants="DCFv1%3BDBInfo%3BALARM_SQUASHING" --configuration Release -nodeReuse:false
            dotnet sonarscanner end /d:sonar.token="${{ env.SONAR_TOKEN  }}"
        continue-on-error: true

      - name: Start Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
        run: |
            dotnet sonarscanner begin `
              /k:"${{ inputs.sonarCloudProjectName }}" `
              /o:"${{ env.lowerCaseOwner }}" `
              /d:sonar.token="${{ env.SONAR_TOKEN }}" `
              /d:sonar.host.url="https://sonarcloud.io" `
              /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml" `
              /d:sonar.cs.vstest.reportsPaths="**/TestResults/**.trx" `
              /d:sonar.exclusions="**/*.yml,**/*.xml" `
              /d:sonar.branch.name="${{ github.ref_name }}"
        continue-on-error: true

      - name: Building
        run: dotnet build "${{ steps.findSlnFile.outputs.solutionFilePath }}" -p:DefineConstants="DCFv1%3BDBInfo%3BALARM_SQUASHING" --configuration Release -nodeReuse:false

      - name: Unit Tests
      # when not using MSTest you'll need to install coverlet.collector nuget in your test solutions
        id: unit-tests
        run: dotnet test "${{ steps.findSlnFile.outputs.solutionFilePath }}" --filter TestCategory!=IntegrationTest --logger "trx;logfilename=unitTestResults.trx" --collect "XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura,opencover
        continue-on-error: true
  
      - name: Stop Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
        run: |
            dotnet sonarscanner end /d:sonar.token="${{ env.SONAR_TOKEN }}"
        continue-on-error: true

      - name: SonarCloud Quality Gate check
        id: sonarcloud-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@8e9b0ca0a7273d6f16986388d98393efdfcf56fd
        with:
          scanMetadataReportFile: .sonarqube/out/.sonar/report-task.txt
        continue-on-error: true
        # Force to fail step after specific time.
        timeout-minutes: 5

      - name: Upload Sonar report-task.txt artifact
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: sonar-report-task
          path: .sonarqube/out/.sonar/report-task.txt
          if-no-files-found: ignore
          retention-days: 14
          
      - name: Run Connector Validator - Validate
        run: |
          dataminer-validator validate protocol-solution `
            --solution-path "${{ github.workspace }}" `
            --output-directory "${{ github.workspace }}" `
            --output-file-name "validateResults" `
            --perform-restore false `
            --debug "${{ inputs.debug }}"
        continue-on-error: true

      - name: Run Connector Validator - Compare
        run: |
          dataminer-validator compare protocol-solution `
            --solution-path "${{ github.workspace }}" `
            --output-directory "${{ github.workspace }}" `
            --output-file-name "compareResults" `
            --previous-validate-output-file-name "previousValidateResults" `
            --current-validate-output-file-name "currentValidateResults" `
            --debug "${{ inputs.debug }}"
        continue-on-error: true

      - name: Archive Results
        uses: actions/upload-artifact@v7
        with:
          name: validatorResults
          path: |
            ${{ github.workspace }}/validateResults.json
            ${{ github.workspace }}/validateResults.html
            ${{ github.workspace }}/compareResults.json
            ${{ github.workspace }}/compareResults.html
            ${{ github.workspace }}/previousValidateResults.json
            ${{ github.workspace }}/previousValidateResults.html
            ${{ github.workspace }}/currentValidateResults.json
            ${{ github.workspace }}/currentValidateResults.html
        continue-on-error: true

      - name: Validator Quality Gate
        id: validator-quality-gate
        run: |
          # Allowed delta in Major/Minor counts between previous and current
          # validate results (regular increment only). Hard-coded for now.
          X=1

          validateFile="${{ github.workspace }}/validateResults.json"
          compareFile="${{ github.workspace }}/compareResults.json"
          currentValidateFile="${{ github.workspace }}/currentValidateResults.json"
          previousValidateFile="${{ github.workspace }}/previousValidateResults.json"
          stateFile="${{ github.workspace }}/validator-gate-state.json"

          # Without validateResults we have nothing to summarize at all - the
          # validate step failed before producing results. Surface that
          # explicitly and exit; the summary will show the entire validation
          # as failed.
          if [ ! -f "$validateFile" ]; then
            missingMsg="Validate results file not found ($validateFile) - the validate step did not produce results, so the entire validation failed."
            jq -n \
              --arg msg "$missingMsg" \
              '{
                status: "failed",
                mode: "missing-results",
                version: "",
                x: 0,
                hasPrevious: false,
                hasCurrentXml: false,
                current: { critical: 0, major: 0, minor: 0 },
                currentSolution: { critical: 0, major: 0, minor: 0 },
                previous: { critical: 0, major: 0, minor: 0, version: "" },
                compareIssueCount: 0,
                failures: [$msg]
              }' > "$stateFile"
            echo "Validator Quality Gate failed:"
            echo "- $missingMsg"
            exit 1
          fi

          validateJson=$(cat "$validateFile")
          # Solution-based counts (main validate step) - used for initial-version gate and surfaced separately.
          solCritical=$(echo "$validateJson" | jq -r '.CriticalIssueCount')
          solMajor=$(echo "$validateJson" | jq -r '.MajorIssueCount')
          solMinor=$(echo "$validateJson" | jq -r '.MinorIssueCount')

          # XML-based current counts (from compare command) - used for compare delta rules so they
          # are apples-to-apples with previousValidateResults (also XML-based).
          # Only produced when a previous version exists; for initial versions we fall back to the
          # solution-based counts above.
          if [ -f "$currentValidateFile" ]; then
            currentValidateJson=$(cat "$currentValidateFile")
            curCritical=$(echo "$currentValidateJson" | jq -r '.CriticalIssueCount')
            curMajor=$(echo "$currentValidateJson" | jq -r '.MajorIssueCount')
            curMinor=$(echo "$currentValidateJson" | jq -r '.MinorIssueCount')
          else
            curCritical="$solCritical"
            curMajor="$solMajor"
            curMinor="$solMinor"
          fi

          # If compareResults is missing we can still show the current counts
          # from validateResults, but we cannot evaluate the compare/version
          # rules. Record that as a failure and continue so the summary still
          # surfaces what we do have.
          compareMissing="false"
          if [ ! -f "$compareFile" ]; then
            compareMissing="true"
            version=""
            compareIssueCount=0
          else
            compareJson=$(cat "$compareFile")
            version=$(echo "$compareJson" | jq -r '.Version')
            compareIssueCount=$(echo "$compareJson" | jq '.Issues | length')
          fi

          prevCritical="null"
          prevMajor="null"
          prevMinor="null"
          prevVersion=""
          if [ -f "$previousValidateFile" ]; then
            prevJson=$(cat "$previousValidateFile")
            prevCritical=$(echo "$prevJson" | jq -r '.CriticalIssueCount')
            prevMajor=$(echo "$prevJson" | jq -r '.MajorIssueCount')
            prevMinor=$(echo "$prevJson" | jq -r '.MinorIssueCount')
            prevVersion=$(echo "$prevJson" | jq -r '.Version // ""')
          fi

          failures=()

          if [ "$compareMissing" = "true" ]; then
            mode="missing-compare"
            failures+=("Compare results file not found ($compareFile) - the compare step did not produce results, so version-based rules could not be evaluated.")
            # Critical must always be 0; still report it on top of the missing-compare failure.
            if [ "$curCritical" != 0 ]; then
              failures+=("Current critical issues: $curCritical (expected 0)")
            fi
          else
            # Detect initial version: compare emits no previous when version is 1.0.0.1
            # or X.0.0.1 without BasedOn. In both cases the previousValidateResults
            # file will not exist. We also keep the version-pattern check as a guard.
            isInitial="false"
            if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.1$ ]] && [ ! -f "$previousValidateFile" ]; then
              isInitial="true"
            fi

            if [ "$isInitial" = "true" ]; then
            mode="initial"
            echo "Initial version $version detected - applying 0/0/0 rule on current validate results."
            if [ "$curCritical" != 0 ]; then failures+=("Critical issue count is expected to be 0 for the initial version. (current = $curCritical)"); fi
            if [ "$curMajor"    != 0 ]; then failures+=("Major issue count is expected to be 0 for the initial version. (current = $curMajor)"); fi
            if [ "$curMinor"    != 0 ]; then failures+=("Minor issue count is expected to be 0 for the initial version. (current = $curMinor)"); fi
          else
            mode="regular"
            echo "Regular increment $version detected - comparing validate results."

            # Helper: describe the trend of a current vs previous count.
            trend() {
              local cur=$1 prev=$2
              if [ "$cur" -gt "$prev" ]; then
                echo "increased by '$((cur - prev))'"
              elif [ "$cur" -lt "$prev" ]; then
                echo "decreased by '$((prev - cur))'"
              else
                echo "remained unchanged"
              fi
            }

            # Critical must be 0 regardless.
            if [ "$curCritical" != 0 ]; then
              failures+=("Critical issue count is expected to be 0. (current=$curCritical)")
            fi

            if [ ! -f "$previousValidateFile" ]; then
              failures+=("Previous validate results file not found ($previousValidateFile) - cannot enforce delta rules.")
            elif [ ! -f "$currentValidateFile" ]; then
              failures+=("XML-based current validate results file not found ($currentValidateFile) - cannot enforce delta rules apples-to-apples.")
            else
              # Major rule: cur.Major <= max(0, prev.Major - X)
              majorTarget=$((prevMajor - X))
              if [ "$majorTarget" -lt 0 ]; then majorTarget=0; fi
              if [ "$curMajor" -gt "$majorTarget" ]; then
                failures+=("Major issue count is expected to decrease by '$X' or more. It currently $(trend "$curMajor" "$prevMajor"). (current = $curMajor, previous = $prevMajor, required <= $majorTarget)")
              fi

              # Minor rule
              if [ "$curMajor" -gt 0 ]; then
                if [ "$curMinor" -gt "$prevMinor" ]; then
                  failures+=("Minor issue count is expected to remain the same or decrease while major issues are present. It currently $(trend "$curMinor" "$prevMinor"). (current = $curMinor, previous = $prevMinor, required <= $prevMinor)")
                fi
              else
                minorTarget=$((prevMinor - X))
                if [ "$minorTarget" -lt 0 ]; then minorTarget=0; fi
                if [ "$curMinor" -gt "$minorTarget" ]; then
                  failures+=("Minor issue count is expected to decrease by '$X' or more (no major issues). It currently $(trend "$curMinor" "$prevMinor"). (current = $curMinor, previous = $prevMinor, required <= $minorTarget)")
                fi
              fi
            fi
          fi
          fi

          # Emit machine-readable state for the summary step.
          status="passed"
          if [ "${#failures[@]}" -gt 0 ]; then
            status="failed"
          fi

          jq -n \
            --arg status "$status" \
            --arg mode "$mode" \
            --arg version "$version" \
            --argjson x "$X" \
            --argjson curCritical "$curCritical" \
            --argjson curMajor "$curMajor" \
            --argjson curMinor "$curMinor" \
            --argjson solCritical "$solCritical" \
            --argjson solMajor "$solMajor" \
            --argjson solMinor "$solMinor" \
            --argjson prevCritical "$prevCritical" \
            --argjson prevMajor "$prevMajor" \
            --argjson prevMinor "$prevMinor" \
            --arg prevVersion "$prevVersion" \
            --argjson compareIssueCount "$compareIssueCount" \
            --argjson hasPrevious "$( [ -f "$previousValidateFile" ] && echo true || echo false )" \
            --argjson hasCurrentXml "$( [ -f "$currentValidateFile" ] && echo true || echo false )" \
            --arg failuresRaw "$(printf '%s\n' "${failures[@]}")" \
            '{
              status: $status,
              mode: $mode,
              version: $version,
              x: $x,
              hasPrevious: $hasPrevious,
              hasCurrentXml: $hasCurrentXml,
              current: { critical: $curCritical, major: $curMajor, minor: $curMinor },
              currentSolution: { critical: $solCritical, major: $solMajor, minor: $solMinor },
              previous: { critical: $prevCritical, major: $prevMajor, minor: $prevMinor, version: $prevVersion },
              compareIssueCount: $compareIssueCount,
              failures: ($failuresRaw | split("\n") | map(select(length > 0)))
            }' > "${{ github.workspace }}/validator-gate-state.json"

          if [ "$status" = "failed" ]; then
            echo "Validator Quality Gate failed:"
            for f in "${failures[@]}"; do echo "- $f"; done
            exit 1
          fi

          echo "Validator Quality Gate passed."
        continue-on-error: true
        shell: bash

      - name: Major Change Checker Quality Gate
        id: mcc-quality-gate
        run: |
          compareFile="${{ github.workspace }}/compareResults.json"
          stateFile="${{ github.workspace }}/mcc-gate-state.json"

          if [ ! -f "$compareFile" ]; then
            # No compare results file at all - this can happen when the compare
            # step itself failed. Surface that as a separate failure.
            jq -n \
              --arg msg "Compare results file not found ($compareFile) - the compare step did not produce results." \
              '{
                status: "failed",
                skipped: false,
                skippedReason: "",
                issueCount: 0,
                version: "",
                previousVersion: "",
                failures: [$msg]
              }' > "$stateFile"
            echo "Major Change Checker Quality Gate failed:"
            echo "- Compare results file not found."
            exit 1
          fi

          compareJson=$(cat "$compareFile")
          skipped=$(echo "$compareJson" | jq -r '.Skipped // false')
          skippedReason=$(echo "$compareJson" | jq -r '.SkippedReason // ""')
          mccVersion=$(echo "$compareJson" | jq -r '.Version // ""')
          mccPrevVersion=$(echo "$compareJson" | jq -r '.PreviousVersion // ""')
          mccIssueCount=$(echo "$compareJson" | jq '.Issues | length')

          failures=()
          status="passed"

          if [ "$skipped" = "true" ]; then
            status="skipped"
            echo "Major Change Checker skipped: $skippedReason"
          else
            if [ "$mccIssueCount" != 0 ]; then
              failures+=("Major Change Checker reported $mccIssueCount issue(s).")
              status="failed"
            fi
          fi

          jq -n \
            --arg status "$status" \
            --argjson skipped "$skipped" \
            --arg skippedReason "$skippedReason" \
            --argjson issueCount "$mccIssueCount" \
            --arg version "$mccVersion" \
            --arg previousVersion "$mccPrevVersion" \
            --arg failuresRaw "$(printf '%s\n' "${failures[@]}")" \
            '{
              status: $status,
              skipped: $skipped,
              skippedReason: $skippedReason,
              issueCount: $issueCount,
              version: $version,
              previousVersion: $previousVersion,
              failures: ($failuresRaw | split("\n") | map(select(length > 0)))
            }' > "$stateFile"

          if [ "$status" = "failed" ]; then
            echo "Major Change Checker Quality Gate failed:"
            for f in "${failures[@]}"; do echo "- $f"; done
            exit 1
          fi

          if [ "$status" = "skipped" ]; then
            echo "Major Change Checker Quality Gate skipped."
          else
            echo "Major Change Checker Quality Gate passed."
          fi
        continue-on-error: true
        shell: bash

      - name: Quality Gate
        id: quality-step
        if: always()
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/quality-gate-summary@main
        with:
          unit-tests-outcome: ${{ steps.unit-tests.outcome }}
          sonar-outcome: ${{ steps.sonarcloud-quality-gate-check.outcome }}
          sonar-status: ${{ steps.sonarcloud-quality-gate-check.outputs.quality-gate-status }}
          validator-outcome: ${{ steps.validator-quality-gate.outcome }}
          validator-state-file: ${{ github.workspace }}/validator-gate-state.json
          major-change-checker-outcome: ${{ steps.mcc-quality-gate.outcome }}
          major-change-checker-state-file: ${{ github.workspace }}/mcc-gate-state.json
        
      - name: Create package name
        if: github.ref_type == 'tag'
        id: packageName
        run: |
          $tempName = "${{ github.repository }}"
          $safeName = $tempName -replace '[\"\/\\<>|:*?]', '_'
          echo "name=$safeName" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Generate SBOM file
        if: github.ref_type == 'tag'
        run: |
          dataminer-sbom generate `
            --solution-path "${{ steps.findSlnFile.outputs.solutionFilePath }}" `
            --package-name "${{ steps.packageName.outputs.name }}" `
            --package-version "${{ github.ref_name }}" `
            --package-supplier "Skyline Communications" `
            --output "${{ github.workspace }}/SBOM" `
            --debug "${{ inputs.debug }}"

      - name: Upload SBOM file
        if: github.ref_type == 'tag'
        uses: actions/upload-artifact@v7
        with:
          name: SBOM
          path: "${{ github.workspace }}/SBOM/*.json"

  auto_generate_catalog_yaml:
    name: Auto-Generating Catalog from GitHub
    if: ${{ github.ref_type == 'branch' &&  github.event_name != 'pull_request' }}
    needs: [validate_trigger]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: read
    steps:
      - name: Azure Login
        uses: azure/login@v3
        if: inputs.use-oidc == 'true'
        with:
          client-id: ${{ inputs.oidc-client-id }}
          tenant-id: ${{ inputs.oidc-tenant-id }}
          subscription-id: ${{ inputs.oidc-subscription-id }}

      - name: Load secrets
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/load-secrets@main
        with:
          use-oidc: ${{ inputs.use-oidc }}
          secret-names: |
            azure-token
          overrides: |
            AZURE_TOKEN=${{ secrets.azureToken }}

      - name: Enable long paths
        run: git config --global core.longpaths true

      - uses: actions/checkout@v6

      - name: Setup NuGet sources
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/setup-nuget-sources@main
        with:
          repository-owner: ${{ github.repository_owner }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          azure-token: ${{ env.AZURE_TOKEN }}

      - name: Install .NET Tools
        run: |
          dotnet tool install -g Skyline.DataMiner.CICD.Tools.GitHubToCatalogYaml --version 2.*

      - name: Create or Extend Catalog.yml
        run: |
          github-to-catalog-yaml \
            --workspace "${{ github.workspace }}" \
            --github-token ${{ secrets.GITHUB_TOKEN }} \
            --github-repository "${{ github.repository }}" \
            --catalog-identifier "${{ vars.catalogIdentifier }}" \
            --debug "${{ inputs.debug }}"
        
      - name: Check if catalog.yml or manifest.yml exists
        id: check_files
        shell: pwsh
        run: |
          if (Test-Path "${{ github.workspace }}/catalog.yml") {
            echo "catalogDetails=catalog.yml" >> $env:GITHUB_ENV
          }
          elseif (Test-Path "${{ github.workspace }}/manifest.yml") {
            echo "catalogDetails=manifest.yml" >> $env:GITHUB_ENV
          }
          else {
            Write-Host "No valid file found!"
            exit 1
          }

      - uses: actions/upload-artifact@v7
        if: env.catalogDetails != ''
        with:
          name: Catalog Details
          path: "${{ github.workspace }}/${{ env.catalogDetails }}"

      - name: Commit .githubtocatalog/auto-generated-catalog
        shell: pwsh
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ github.workspace }}/.githubtocatalog/auto-generated-catalog.yml"
          
          # Check if there are any changes to be committed
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "auto-generated"
          }
          else {
            Write-Host "No changes to commit."
          }

      - name: Retrieve reusable workflows token from Key Vault
        if: inputs.use-oidc == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Fetching reusable-workflows-token from Azure Key Vault..."
          secret_value=$(az keyvault secret show \
            --vault-name kv-master-cicd-secrets \
            --name reusable-workflows-token \
            --query value -o tsv 2>/dev/null || true)
          if [ -z "$secret_value" ]; then
            echo "::warning::No 'reusable-workflows-token' secret in Azure Key Vault 'kv-master-cicd-secrets'. Falling back to GITHUB_TOKEN for git push."
          else
            echo "::add-mask::$secret_value"
            echo "WRAPPER_MIGRATION_TOKEN=$secret_value" >> "$GITHUB_ENV"
          fi

      - name: Push .githubtocatalog/auto-generated-catalog
        shell: bash
        run: |
          set -euo pipefail
          push_token="${WRAPPER_MIGRATION_TOKEN:-${GITHUB_TOKEN}}"
          if [ -n "${WRAPPER_MIGRATION_TOKEN:-}" ]; then
            echo "Using reusable-workflows-token for git push."
          else
            echo "Using GITHUB_TOKEN for git push."
          fi
          actor_login=$(curl -fsSL \
            -H "Authorization: Bearer ${push_token}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user | jq -r '.login')
          echo "Resolved git push token to GitHub actor: ${actor_login}"
          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${push_token}@github.com/${{ github.repository }}.git"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  artifact_creation:
    name: Artifact Creation
    needs: [validate_trigger]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: read
    steps:
      - name: Azure Login
        uses: azure/login@v3
        if: inputs.use-oidc == 'true'
        with:
          client-id: ${{ inputs.oidc-client-id }}
          tenant-id: ${{ inputs.oidc-tenant-id }}
          subscription-id: ${{ inputs.oidc-subscription-id }}

      - name: Load secrets
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/load-secrets@main
        with:
          use-oidc: ${{ inputs.use-oidc }}
          secret-names: |
            azure-token
          overrides: |
            AZURE_TOKEN=${{ secrets.azureToken }}

      - name: Enable long paths
        run: git config --global core.longpaths true

      - uses: actions/checkout@v6

      - name: Install .NET Tools
        run: |
          dotnet tool install --global Skyline.DataMiner.CICD.Tools.Packager --version 6.*

      - name: Find solution file
        id: findSlnFile
        run: |
          echo solutionFilePath=$(find . -type f -name '*.sln' -o -name '*.slnx') >> $GITHUB_OUTPUT
        shell: bash

      - name: Setup NuGet sources
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/setup-nuget-sources@main
        with:
          repository-owner: ${{ github.repository_owner }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          azure-token: ${{ env.AZURE_TOKEN }}

      - name: NuGet restore solution
        run: dotnet restore "${{ steps.findSlnFile.outputs.solutionFilePath }}"

      - name: Create package name
        id: packageName
        run: |
          tempName="${{ github.repository }}"
          echo name=${tempName//[\"\/\\<>|:*?]/_} >> $GITHUB_OUTPUT
        shell: bash

#ON RELEASE OR PRE-RELEASE
      - name: Create DMProtocol - Release
        if: github.ref_type == 'tag'
        run: |
          dataminer-package-create dmprotocol ${{ github.workspace }} \
            --name  "${{ steps.packageName.outputs.name }}" \
            --output ${{ github.workspace }} \
            --version-override "${{ github.ref_name  }}" \
            --debug "${{ inputs.debug }}"

#ON BUILD
      - name: Find and extract Protocol Version
        if: github.ref_type != 'tag'
        run: |
          # Find the protocol.xml file
          xml_file=$(find "${{ github.workspace }}" -maxdepth 1 -name "protocol.xml" -or -name "Protocol.xml" | head -n 1)

          # Extract the Protocol Version using awk and store it in a variable
          protocol_version=$(awk -F '[><]' '/<Version>/ {print $3}' "$xml_file")

          # Print the extracted version for verification
          echo "Extracted Protocol Version: $protocol_version"

          # Set the extracted version as an environment variable for future use
          echo "PROTOCOL_VERSION=$protocol_version" >> $GITHUB_ENV
        shell: bash

      - name: Create DMProtocol - Build
        if: github.ref_type != 'tag'
        run: |
          dataminer-package-create dmprotocol ${{ github.workspace }} \
            --name  "${{ steps.packageName.outputs.name }}" \
            --output ${{ github.workspace }} \
            --version-override "${{ env.PROTOCOL_VERSION }}_B${{ github.run_number }}" \
            --debug "${{ inputs.debug }}"
        shell: bash

      - uses: actions/upload-artifact@v7
        with:
          name: Connector Package
          path: "${{ github.workspace }}/${{ steps.packageName.outputs.name }}.dmprotocol"

  artifact_registration:
    name: Artifact Registration and Upload
    if: github.ref_type == 'tag'
    runs-on: windows-latest
    needs: [validate_skyline_quality_gate,artifact_creation]
    permissions:
      contents: read
      id-token: write
      packages: read
    steps:
      - name: Azure Login
        uses: azure/login@v3
        if: inputs.use-oidc == 'true'
        with:
          client-id: ${{ inputs.oidc-client-id }}
          tenant-id: ${{ inputs.oidc-tenant-id }}
          subscription-id: ${{ inputs.oidc-subscription-id }}

      - name: Load secrets
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/load-secrets@main
        with:
          use-oidc: ${{ inputs.use-oidc }}
          secret-names: |
            dataminer-token
            signing-client-id
            signing-client-secret
            signing-tenant-id
            signing-key-vault-certificate
            signing-key-vault-url
            protocol-signing-username
            protocol-signing-password
          overrides: |
            DATAMINER_TOKEN=${{ secrets.api-key }}

      - name: Enable long paths
        run: git config --global core.longpaths true

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate auto-generated catalog YAML file existence
        shell: pwsh
        run: |
          if (!(Test-Path "${{ github.workspace }}/.githubtocatalog/auto-generated-catalog.yml")) {
            Write-Host "Error: The auto-generated catalog YAML file was not found."
            Write-Host "Run the workflow on a branch before releasing, and ensure the tag points to the latest commit containing the auto-generated-catalog.yml file."
            exit 1
          }

      - name: Find branch
        id: findBranch
        run: |
          #!/bin/bash
          set -e  # Exit immediately if a command exits with a non-zero status.
          
          # Capture the branches containing the tag and process them
          branches="$(git branch --contains tags/${{ github.ref_name }} -r | grep 'origin/' | grep -vE '.*/.*/' | sed 's#origin/##' | paste -sd ",")"
          
          # Append to GitHub Actions output
          echo "branch=${branches}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Target Branch
        id: showResult
        run: echo "${{ steps.findBranch.outputs.branch }}"

      - name: Retrieve Installation Package
        id: retrieveInstallationPackage
        uses: actions/download-artifact@v8
        with:
          name: Connector Package
          path: _DataMinerInstallationPackage

      - name: Find Installation package
        id: findInstallationPackage
        run: |
          IFS=$'\n'
          echo dmprotocolPackageName=$(find _DataMinerInstallationPackage -type f -name '*.dmprotocol') >> $GITHUB_OUTPUT
          unset IFS
        shell: bash

      - name: Install .NET Tools
        run: |
          dotnet tool install -g Skyline.DataMiner.CICD.Tools.CatalogUpload --version 4.*
          dotnet tool install -g Skyline.DataMiner.CICD.Tools.GitHubToCatalogYaml --version 2.*
          dotnet tool install -g Skyline.DataMiner.CICD.Tools.Sbom --version 1.*

      - name: Retrieve SBOM file
        id: retrieveSbomFile
        uses: actions/download-artifact@v8
        with:
          name: SBOM
          path: _SBOM

      - name: Find SBOM file
        id: findSbomFile
        run: |
          IFS=$'\n'
          echo sbomFile=$(find _SBOM -type f -name '*.json') >> $GITHUB_OUTPUT
          unset IFS
        shell: bash

      - name: Add SBOM to package
        shell: pwsh
        run: |
          dataminer-sbom add `
            --sbom-file "${{ steps.findSbomFile.outputs.sbomFile }}" `
            --package-file "${{ steps.findInstallationPackage.outputs.dmprotocolPackageName }}" `
            --debug "${{ inputs.debug }}"

      - name: Create or Extend Catalog.yml
        shell: pwsh
        run: |
          github-to-catalog-yaml `
            --workspace "${{ github.workspace }}" `
            --github-token ${{ secrets.GITHUB_TOKEN }} `
            --github-repository "${{ github.repository }}" `
            --catalog-identifier "${{ vars.catalogIdentifier }}" `
            --debug "${{ inputs.debug }}"

      - name: Check if catalog.yml or manifest.yml exists
        id: check_files
        shell: pwsh
        run: |
          if (Test-Path "${{ github.workspace }}/catalog.yml") {
            echo "catalogDetails=catalog.yml" >> $env:GITHUB_ENV
          }
          elseif (Test-Path "${{ github.workspace }}/manifest.yml") {
            echo "catalogDetails=manifest.yml" >> $env:GITHUB_ENV
          }
          else {
            Write-Host "No valid file found!"
            exit 1
          }

      - name: Install Tools
        if: ${{ inputs.use-oidc == 'true' && github.repository_owner == 'SkylineCommunications' }}
        run: |
          dotnet tool install -g Skyline.DataMiner.CICD.Tools.PackageSign --version 2.*

      - name: Sign generated dmprotocol package
        shell: pwsh
        if: ${{ inputs.use-oidc == 'true' && github.repository_owner == 'SkylineCommunications' }}
        env:
          AZURE_TENANT_ID: ${{ env.SIGNING_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ env.SIGNING_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ env.SIGNING_CLIENT_SECRET }}
          AZURE_KEY_VAULT_URL: ${{ env.SIGNING_KEY_VAULT_URL }}
          AZURE_KEY_VAULT_CERTIFICATE: ${{ env.SIGNING_KEY_VAULT_CERTIFICATE }}
          SIGNING_USERNAME: ${{ env.PROTOCOL_SIGNING_USERNAME }}
          SIGNING_PASSWORD: ${{ env.PROTOCOL_SIGNING_PASSWORD }}
        run: |
          dataminer-package-signature sign dmprotocol `
            --package-location "${{ steps.findInstallationPackage.outputs.dmprotocolPackageName }}" `
            --debug "${{ inputs.debug }}"

      - uses: actions/upload-artifact@v7
        if: env.catalogDetails != ''
        with:
          name: Catalog Details
          path: "${{ github.workspace }}/${{ env.catalogDetails }}"

      - name: Upload to Catalog
        shell: pwsh
        env:
          CICDIsForSkyline: "${{ github.repository_owner == 'SkylineCommunications' }}"
        run: |
          dataminer-catalog-upload with-registration `
            --path-to-artifact "${{ steps.findInstallationPackage.outputs.dmprotocolPackageName }}" `
            --artifact-version ${{ github.ref_name }} `
            --branch "${{ steps.findBranch.outputs.branch }}" `
            --dm-catalog-token ${{ env.DATAMINER_TOKEN }} `
            --debug "${{ inputs.debug }}"
