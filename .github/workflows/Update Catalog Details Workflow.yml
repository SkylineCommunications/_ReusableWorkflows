name: Update Catalog Details

# Needed for OIDC, checkout, git-push, ...
permissions:
  contents: read

on:
  workflow_call:
    inputs:
      # Optional OIDC inputs in case outside SkylineCommunications organization
      oidc-client-id:
        required: false
        type: string
      oidc-tenant-id:
        required: false
        type: string
      oidc-subscription-id:
        required: false
        type: string

      debug:
        required: false
        type: boolean

    secrets:
      api-key:
        required: false

jobs:

  validate_trigger:
    name: Validate Trigger
    runs-on: ubuntu-latest
    steps:
      - uses: SkylineCommunications/_ReusableWorkflows/.github/actions/guard-trigger@main

  check_oidc:
    name: Check OIDC
    needs: [validate_trigger]
    runs-on: ubuntu-latest
    outputs:
      client-id: ${{ steps.resolve.outputs.client-id }}
      tenant-id: ${{ steps.resolve.outputs.tenant-id }}
      subscription-id: ${{ steps.resolve.outputs.subscription-id }}
      use-oidc: ${{ steps.resolve.outputs.use-oidc }}
    steps:
      - id: resolve
        uses: SkylineCommunications/_ReusableWorkflows/.github/actions/resolve-oidc@main
        with:
          client-id: ${{ inputs.oidc-client-id }}
          tenant-id: ${{ inputs.oidc-tenant-id }}
          subscription-id: ${{ inputs.oidc-subscription-id }}
          repository-owner: ${{ github.repository_owner }}

  discover_projects:
    name: Discover Project Types
    needs: [validate_trigger]
    runs-on: ubuntu-latest
    outputs:
      has-dataminer-projects: ${{ steps.detect-projects.outputs.has-dataminer-projects }}
    steps:
      - uses: actions/checkout@v6

      - name: Detect DataMiner SDK projects
        id: detect-projects
        shell: pwsh
        run: |
          $projectFiles = Get-ChildItem -Path . -Recurse -Filter "*.csproj"
          $hasDataminerProjects = $false

          foreach ($project in $projectFiles) {
            [xml]$content = Get-Content $project.FullName

            # Skyline.DataMiner.Sdk projects expose DataMinerType.
            if ($content.SelectNodes("//DataMinerType").Count -gt 0) {
              Write-Host "Found at least one DataMiner project"
              $hasDataminerProjects = $true
              break
            }
          }

          echo "has-dataminer-projects=$($hasDataminerProjects.ToString().ToLower())" >> $env:GITHUB_OUTPUT

  update_catalog_details:
    name: Update Catalog Details
    runs-on: ubuntu-latest
    needs: [check_oidc, discover_projects]
    permissions:
      contents: write
      id-token: write
      actions: write
    steps:
        - name: Azure Login
          uses: azure/login@v3
          if: needs.check_oidc.outputs.use-oidc == 'true'
          with:
            client-id: ${{ needs.check_oidc.outputs.client-id }}
            tenant-id: ${{ needs.check_oidc.outputs.tenant-id }}
            subscription-id: ${{ needs.check_oidc.outputs.subscription-id }}

        - name: Load secrets
          uses: SkylineCommunications/_ReusableWorkflows/.github/actions/load-secrets@main
          with:
            use-oidc: ${{ needs.check_oidc.outputs.use-oidc }}
            secret-names: |
              dataminer-token
            overrides: |
              DATAMINER_TOKEN=${{ secrets.api-key }}

        - name: Enable long paths
          run: git config --global core.longpaths true

        - uses: actions/checkout@v6

        - name: Install .NET Tools
          run: |
            dotnet tool install -g Skyline.DataMiner.CICD.Tools.CatalogUpload --version 4.*
            dotnet tool install -g Skyline.DataMiner.CICD.Tools.GitHubToCatalogYaml --version 2.*

        - name: Create or Extend Catalog.yml
          if: needs.discover_projects.outputs.has-dataminer-projects != 'true'
          run: |
            github-to-catalog-yaml \
              --workspace "${{ github.workspace }}" \
              --github-token ${{ secrets.GITHUB_TOKEN }} \
              --github-repository "${{ github.repository }}" \
              --catalog-identifier "${{ vars.catalogIdentifier }}" \
              --debug "${{ inputs.debug }}"

        - name: Detect catalog detail files
          id: detect_catalog_files
          shell: pwsh
          run: |
            $workspace = "${{ github.workspace }}"
            $isDataminerScenario = "${{ needs.discover_projects.outputs.has-dataminer-projects }}" -eq "true"
            $catalogFiles = New-Object System.Collections.Generic.List[string]

            if ($isDataminerScenario) {
              $manifestFiles = Get-ChildItem -Path $workspace -Recurse -File -Filter "manifest.yml" |
                Where-Object { $_.FullName -match "[\\/]CatalogInformation[\\/]manifest\.yml$" }

              foreach ($file in $manifestFiles) {
                $relativePath = $file.FullName.Substring($workspace.Length + 1).Replace('\\', '/')
                $catalogFiles.Add($relativePath)
              }
            }
            else {
              if (Test-Path "$workspace/catalog.yml") {
                $catalogFiles.Add("catalog.yml")
              }
              elseif (Test-Path "$workspace/manifest.yml") {
                $catalogFiles.Add("manifest.yml")
              }
            }

            if ($catalogFiles.Count -eq 0) {
              Write-Host "No valid catalog detail files found."
              exit 1
            }

            echo "catalog-files<<EOF" >> $env:GITHUB_OUTPUT
            foreach ($catalogFile in $catalogFiles) {
              echo $catalogFile >> $env:GITHUB_OUTPUT
            }
            echo "EOF" >> $env:GITHUB_OUTPUT

        - uses: actions/upload-artifact@v7
          if: steps.detect_catalog_files.outputs.catalog-files != ''
          with:
            name: Catalog Details
            path: ${{ steps.detect_catalog_files.outputs.catalog-files }}

        - name: Commit .githubtocatalog/auto-generated-catalog
          if: needs.discover_projects.outputs.has-dataminer-projects != 'true'
          shell: pwsh
          run: |
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add "${{ github.workspace }}/.githubtocatalog/auto-generated-catalog.yml"

            # Check if there are any changes to be committed
            git diff --staged --quiet
            if ($LASTEXITCODE -ne 0) {
              git commit -m "auto-generated"
            }
            else {
              Write-Host "No changes to commit."
            }

        - name: Push .githubtocatalog/auto-generated-catalog
          if: needs.discover_projects.outputs.has-dataminer-projects != 'true'
          run: |
            git push
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        - name: Upload to Catalog
          shell: pwsh
          run: |
            $catalogFiles = @'
            ${{ steps.detect_catalog_files.outputs.catalog-files }}
            '@ -split "`r?`n" |
              ForEach-Object { $_.Trim() } |
              Where-Object { $_ -ne "" }

            foreach ($catalogFile in $catalogFiles) {
              Write-Host "Updating catalog details for: $catalogFile"
              dataminer-catalog-upload update-catalog-details `
                --path-to-catalog-yml "${{ github.workspace }}/$catalogFile" `
                --dm-catalog-token "${{ env.DATAMINER_TOKEN }}" `
                --debug "${{ inputs.debug }}"
            }